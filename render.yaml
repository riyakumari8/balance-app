# render.yaml
# Blueprint to deploy the Balance Spring Boot Backend + PostgreSQL Database
services:
  

  - type: web
    name: balance-backend
    env: docker
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: balance-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: balance-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,http://localhost
      - key: JWT_SECRET
        generateValue: true
      - key: TESSERACT_DATAPATH
        value: /usr/share/tessdata/
